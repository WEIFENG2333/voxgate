name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-13
          - os: macos-14
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Install deps Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libopusfile-dev ffmpeg pkg-config
      - name: Install deps macOS
        if: runner.os == 'macOS'
        run: brew install opus opusfile ffmpeg pkg-config
      - name: Install deps Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install ffmpeg -y
          choco install pkgconfiglite -y
          vcpkg install opus:x64-windows opusfile:x64-windows
          echo "CGO_CFLAGS=-IC:/vcpkg/installed/x64-windows/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-LC:/vcpkg/installed/x64-windows/lib -lopus" >> "$GITHUB_ENV"
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./cmd/ime-asr

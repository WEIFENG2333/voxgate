name: ci

on:
  push:
  pull_request:

jobs:
  test:
    env:
      CGO_ENABLED: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-13
          - os: macos-14
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Install deps Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libopusfile-dev ffmpeg pkg-config
      - name: Install deps macOS
        if: runner.os == 'macOS'
        run: brew install opus opusfile ffmpeg pkg-config
      - name: Install deps Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install ffmpeg -y
          choco install pkgconfiglite -y
          choco install mingw -y
          vcpkg install opus:x64-mingw-dynamic opusfile:x64-mingw-dynamic
          echo "CC=C:/ProgramData/chocolatey/lib/mingw/tools/install/mingw64/bin/gcc.exe" >> "$GITHUB_ENV"
          echo "CGO_CFLAGS=-IC:/vcpkg/installed/x64-mingw-dynamic/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-LC:/vcpkg/installed/x64-mingw-dynamic/lib -lopus -lopusfile -logg" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=C:/vcpkg/installed/x64-mingw-dynamic/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "PATH=C:/ProgramData/chocolatey/lib/mingw/tools/install/mingw64/bin;C:/vcpkg/installed/x64-mingw-dynamic/bin;$PATH" >> "$GITHUB_ENV"
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./cmd/ime-asr

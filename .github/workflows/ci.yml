name: ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    env:
      CGO_ENABLED: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-15-intel
          - os: macos-14
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Install deps Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libopusfile-dev ffmpeg pkg-config
      - name: Install deps macOS
        if: runner.os == 'macOS'
        run: brew install opus opusfile ffmpeg pkg-config
      - name: Install deps Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install ffmpeg -y
          choco install pkgconfiglite -y
          choco install mingw -y
          vcpkg install opus:x64-mingw-dynamic opusfile:x64-mingw-dynamic
          echo "CC=C:/ProgramData/mingw64/mingw64/bin/gcc.exe" >> "$GITHUB_ENV"
          echo "PKG_CONFIG=C:/ProgramData/chocolatey/bin/pkg-config.exe" >> "$GITHUB_ENV"
          echo "CGO_CFLAGS=-IC:/vcpkg/installed/x64-mingw-dynamic/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-LC:/vcpkg/installed/x64-mingw-dynamic/lib -lopus -lopusfile -logg" >> "$GITHUB_ENV"
          echo "VOXGATE_FFMPEG=C:/ProgramData/chocolatey/bin/ffmpeg.exe" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=C:/vcpkg/installed/x64-mingw-dynamic/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "PATH=C:/ProgramData/mingw64/mingw64/bin;C:/vcpkg/installed/x64-mingw-dynamic/bin;$PATH" >> "$GITHUB_ENV"
      - name: Check formatting
        if: runner.os == 'Linux'
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"
      - name: Check shell scripts
        if: runner.os == 'Linux'
        run: sh -n scripts/install.sh
      - name: Check PowerShell scripts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content scripts/install.ps1 -Raw), [ref]$null)
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Race test
        if: runner.os == 'Linux'
        run: go test -race ./...
      - name: Build
        run: go build ./cmd/voxgate
      - name: E2E harness
        if: runner.os == 'Linux'
        run: make test-e2e
